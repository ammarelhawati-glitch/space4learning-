<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة اختبارات الفيزياء الذكية</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 95%;
            max-width: 650px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* واجهة الإعدادات */
        .setup-screen h2 { color: var(--primary); margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #ddd;
            font-size: 1rem;
        }

        .start-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        /* واجهة الاختبار */
        .quiz-screen { display: none; }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .timer { font-weight: bold; color: var(--error); font-size: 1.2rem; }
        .question-text { font-size: 1.3rem; margin-bottom: 25px; line-height: 1.6; }
        
        .options-grid { display: grid; gap: 12px; }
        .opt-btn {
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: 1.1rem;
            text-align: right;
            transition: 0.2s;
        }

        .opt-btn:hover:not([disabled]) { border-color: var(--accent); background: #f0f7ff; }
        .correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background: var(--error) !important; color: white; border-color: var(--error); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen" class="setup-screen">
        <h2>إعداد الاختبار الشامل</h2>
        
        <div class="form-group">
            <label>نوع الاختبار (الموضوع):</label>
            <select id="topic-select">
                <option value="all">متنوع (كل الأقسام)</option>
                <option value="SHM">الحركة التوافقية البسيطة (SHM)</option>
                <option value="Optics">الضوء والبصريات</option>
                <option value="Electromagnetism">الكهرومغناطيسية</option>
            </select>
        </div>

        <div class="form-group">
            <label>عدد الأسئلة:</label>
            <select id="count-select">
                <option value="5">5 أسئلة</option>
                <option value="10">10 أسئلة</option>
                <option value="20">20 سؤال</option>
            </select>
        </div>

        <div class="form-group">
            <label>وقت الاختبار الكلي:</label>
            <select id="time-select">
                <option value="2">دقيقتان</option>
                <option value="5">5 دقائق</option>
                <option value="10">10 دقائق</option>
            </select>
        </div>

        <button class="start-btn" onclick="startQuiz()">ابدأ الاختبار الآن</button>
    </div>

    <div id="quiz-screen" class="quiz-screen">
        <div class="quiz-header">
            <div>سؤال <span id="q-current">1</span> / <span id="q-total">0</span></div>
            <div class="timer" id="timer-display">00:00</div>
        </div>
        
        <div id="question-text" class="question-text"></div>
        <div class="options-grid" id="options-box"></div>
        
        <button id="next-btn" class="start-btn hidden" style="margin-top: 20px;" onclick="nextQuestion()">السؤال التالي</button>
    </div>

    <div id="result-screen" class="quiz-screen" style="text-align: center;">
        <h2 id="result-msg"></h2>
        <div style="font-size: 3rem; margin: 20px 0;" id="final-score">0/0</div>
        <button class="start-btn" onclick="location.reload()">إعادة اختبار جديد</button>
    </div>
</div>

<script>
    let allQuestions = [];
    let filteredQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let timer;
    let timeLeft;

    // 1. جلب البيانات عند فتح الصفحة
    async function loadData() {
        try {
            const response = await fetch('questions.json');
            allQuestions = await response.json();
        } catch (e) {
            alert("فشل تحميل قاعدة البيانات. تأكد من ملف JSON");
        }
    }

    // 2. بدء الاختبار بناءً على الخيارات
    function startQuiz() {
        const topic = document.getElementById('topic-select').value;
        const count = parseInt(document.getElementById('count-select').value);
        timeLeft = parseInt(document.getElementById('time-select').value) * 60;

        // تصفية الأسئلة
        filteredQuestions = topic === 'all' 
            ? [...allQuestions] 
            : allQuestions.filter(q => q.topic === topic);

        // خلط الأسئلة واختيار العدد المطلوب
        filteredQuestions = filteredQuestions.sort(() => 0.5 - Math.random()).slice(0, count);

        if(filteredQuestions.length === 0) {
            alert("لا توجد أسئلة كافية في هذا القسم حالياً");
            return;
        }

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('q-total').innerText = filteredQuestions.length;
        
        startTimer();
        showQuestion();
    }

    // 3. عرض السؤال
    function showQuestion() {
        const q = filteredQuestions[currentIdx];
        document.getElementById('q-current').innerText = currentIdx + 1;
        document.getElementById('question-text').innerText = q.question;
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        document.getElementById('next-btn').classList.add('hidden');

        // جلب الخيارات من 1 إلى 4 حسب هيكلك
        for(let i=1; i<=4; i++) {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = q[`option${i}`];
            btn.onclick = () => checkAnswer(btn, q.answer);
            box.appendChild(btn);
        }
    }

    // 4. التحقق من الإجابة
    function checkAnswer(btn, correct) {
        const allBtns = document.querySelectorAll('.opt-btn');
        if(btn.innerText === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }
        allBtns.forEach(b => b.disabled = true);
        document.getElementById('next-btn').classList.remove('hidden');
    }

    // 5. السؤال التالي أو النهاية
    function nextQuestion() {
        currentIdx++;
        if(currentIdx < filteredQuestions.length) {
            showQuestion();
        } else {
            endQuiz();
        }
    }

    // 6. المؤقت
    function startTimer() {
        timer = setInterval(() => {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer-display').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            if(timeLeft <= 0) {
                clearInterval(timer);
                endQuiz("انتهى الوقت!");
            }
            timeLeft--;
        }, 1000);
    }

    function endQuiz(msg = "اكتمل الاختبار") {
        clearInterval(timer);
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('result-msg').innerText = msg;
        document.getElementById('final-score').innerText = `${score} / ${filteredQuestions.length}`;
    }

    window.onload = loadData;
</script>

</body>
</html>
