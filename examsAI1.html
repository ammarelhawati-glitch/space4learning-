<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الفيزياء - الاختبار الشامل</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 95%;
            max-width: 600px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }

        /* شاشة الإعدادات */
        .setup-screen h2 { color: var(--primary); text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #ddd;
            font-size: 1rem;
            outline: none;
        }

        .start-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .start-btn:hover { background: #1a252f; }

        /* شاشة الاختبار */
        #quiz-screen { display: none; }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
        }
        .timer { color: var(--error); font-weight: bold; font-size: 1.2rem; }
        
        .question-text {
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .options-grid { display: grid; gap: 10px; }
        .opt-btn {
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 1.1rem;
            text-align: right;
            transition: 0.2s;
        }
        .opt-btn:hover:not([disabled]) { border-color: var(--accent); background: #f0f7ff; }

        .correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background: var(--error) !important; color: white; border-color: var(--error); }

        #next-btn {
            margin-top: 25px;
            background: var(--accent);
            display: none;
        }

        /* شاشة النتيجة */
        #result-screen { display: none; text-align: center; }
        .score-circle {
            font-size: 3rem;
            color: var(--primary);
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h2>إعداد الاختبار الشامل</h2>
        <div class="form-group">
            <label>اختر الموضوع:</label>
            <select id="topic-select">
                <option value="all">كل المواضيع (اختبار متنوع)</option>
                <option value="SHM">الحركة التوافقية البسيطة (SHM)</option>
                <option value="Optics">الضوء والمرايا</option>
                <option value="Electricity">الكهرباء الساكنة</option>
            </select>
        </div>

        <div class="form-group">
            <label>عدد الأسئلة:</label>
            <select id="count-select">
                <option value="5">5 أسئلة</option>
                <option value="10">10 أسئلة</option>
                <option value="20">20 سؤال</option>
            </select>
        </div>

        <div class="form-group">
            <label>وقت الاختبار:</label>
            <select id="time-select">
                <option value="1">دقيقة واحدة</option>
                <option value="5">5 دقائق</option>
                <option value="10">10 دقائق</option>
            </select>
        </div>

        <button class="start-btn" onclick="initQuiz()">ابدأ الاختبار</button>
    </div>

    <div id="quiz-screen">
        <div class="quiz-header">
            <div>سؤال <span id="q-num">1</span> من <span id="q-total">0</span></div>
            <div class="timer" id="timer">00:00</div>
        </div>
        <div id="question-text" class="question-text"></div>
        <div id="options-box" class="options-grid"></div>
        <button id="next-btn" class="start-btn" onclick="handleNext()">السؤال التالي</button>
    </div>

    <div id="result-screen">
        <h2 id="result-title">انتهى الاختبار</h2>
        <div class="score-circle" id="final-score">0 / 0</div>
        <p id="result-comment"></p>
        <button class="start-btn" onclick="location.reload()">إجراء اختبار جديد</button>
    </div>
</div>

<script>
    let db = []; // قاعدة البيانات الأصلية
    let currentQuestions = []; // الأسئلة المختارة للاختبار الحالي
    let currentIndex = 0;
    let score = 0;
    let timerInterval;

    // جلب البيانات من ملف JSON عند تحميل الصفحة
    async function loadDatabase() {
        try {
            const response = await fetch('questions.json');
            db = await response.json();
        } catch (error) {
            console.error("فشل تحميل الأسئلة:", error);
            alert("تأكد من وجود ملف questions.json بجانب صفحة الـ HTML");
        }
    }

    // بدء الاختبار
    function initQuiz() {
        const topic = document.getElementById('topic-select').value;
        const count = parseInt(document.getElementById('count-select').value);
        const minutes = parseInt(document.getElementById('time-select').value);

        // 1. تصفية الأسئلة
        let pool = topic === 'all' ? [...db] : db.filter(q => q.topic === topic);

        if (pool.length === 0) {
            alert("لا توجد أسئلة كافية لهذا القسم حالياً.");
            return;
        }

        // 2. خلط الأسئلة واختيار العدد المطلوب
        currentQuestions = pool.sort(() => 0.5 - Math.random()).slice(0, count);

        // 3. تبديل الواجهات
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('q-total').innerText = currentQuestions.length;

        renderQuestion();
        startTimer(minutes * 60);
    }

    function renderQuestion() {
        const q = currentQuestions[currentIndex];
        document.getElementById('q-num').innerText = currentIndex + 1;
        document.getElementById('question-text').innerText = q.question;
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        document.getElementById('next-btn').style.display = 'none';

        // إنشاء أزرار الخيارات بناءً على مفاتيحك (option1, option2...)
        for (let i = 1; i <= 4; i++) {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = q[`option${i}`];
            btn.onclick = () => checkAnswer(btn, q.answer);
            box.appendChild(btn);
        }
    }

    function checkAnswer(btn, correct) {
        const allBtns = document.querySelectorAll('.opt-btn');
        if (btn.innerText === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }
        allBtns.forEach(b => b.disabled = true);
        document.getElementById('next-btn').style.display = 'block';
    }

    function handleNext() {
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            renderQuestion();
        } else {
            showResults();
        }
    }

    function startTimer(seconds) {
        let timeLeft = seconds;
        timerInterval = setInterval(() => {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer').innerText = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                showResults("انتهى الوقت!");
            }
            timeLeft--;
        }, 1000);
    }

    function showResults(msg = "انتهى الاختبار") {
        clearInterval(timerInterval);
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('result-title').innerText = msg;
        document.getElementById('final-score').innerText = `${score} / ${currentQuestions.length}`;
        
        const percent = (score / currentQuestions.length) * 100;
        document.getElementById('result-comment').innerText = 
            percent >= 50 ? "أحسنت! أداء ممتاز." : "حاول مرة أخرى لتحسين مستواك.";
    }

    window.onload = loadDatabase;
</script>

</body>
</html>
