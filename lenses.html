<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العدسات - مساحتك للتعلم</title>
    <style>
        /* 1. التنسيقات العامة */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; display: flex; height: 100vh; 
            background-color: #f0f4f8; overflow: hidden;
            direction: rtl;
        }

        .sidebar {
            width: 300px; background-color: #1e3a5f; color: white;
            display: flex; flex-direction: column; padding: 20px;
            box-shadow: -4px 0 15px rgba(0,0,0,0.2);
            transition: 0.4s ease; z-index: 2000; 
        }
        .sidebar h2 { 
            text-align: center; font-size: 1.3em; color: #90cdf4; 
            border-bottom: 1px solid #2c5282; padding-bottom: 15px; 
        }

        .mobile-header { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 60px; 
            background: #1e3a5f; color: white; align-items: center; 
            justify-content: center; z-index: 1000; 
            font-weight: 900; font-size: 1.4em;
        }
        .mobile-nav-toggle { 
            display: none; position: fixed; top: 15px; right: 15px; 
            z-index: 1100; cursor: pointer; background: transparent; 
            color: white; border: none; font-size: 26px; 
        }
        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; 
            height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; 
        }

        /* 4. أزرار القائمة */
        .menu-btn { 
            background: #2a4365; color: #ebf8ff; border: none; 
            padding: 14px; margin-bottom: 10px; border-radius: 10px; 
            cursor: pointer; text-align: right; font-size: 1em; 
            transition: 0.3s; width: 100%;
        }
        .menu-btn:hover { background: #3182ce; }
        .menu-btn.active { background: #4299e1; font-weight: bold; }
        .home-btn { 
            margin-top: auto; padding: 12px; 
            background: linear-gradient(135deg, #48bb78, #38a169); 
            color: white; text-decoration: none; border-radius: 10px; text-align: center; 
        }

        /* 5. منطقة المحتوى الرئيسي */
        .main-content { flex: 1; padding: 20px; display: flex; overflow: hidden; position: relative; }
        .display-card { 
            width: 100%; height: 100%; background: white; border-radius: 15px; 
            display: none; overflow-y: auto; padding: 20px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.05); 
        }
        .active-card { display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 10px; }

        /* 6. الاختبار والمؤقت */
        #quiz-timer { 
            background: #e74c3c; color: white; padding: 10px 20px; 
            border-radius: 8px; font-weight: bold; position: sticky; 
            top: 0; z-index: 10; display: inline-block; margin-bottom: 20px; 
        }
        .question-item { 
            background: #f7fafc; padding: 15px; border-radius: 10px; 
            margin-bottom: 15px; border-right: 5px solid #4299e1; 
        }
        .correct-answer { background-color: #d4edda !important; border-right: 5px solid #28a745 !important; }
        .wrong-answer { background-color: #f8d7da !important; border-right: 5px solid #dc3545 !important; }
        .feedback-text { font-weight: bold; margin-top: 10px; display: none; color: #c0392b; }

        @media (max-width: 768px) {
            body { height: auto; overflow-y: auto; }
            .sidebar { position: fixed; right: -310px; top: 0; height: 100vh; width: 280px; }
            .sidebar.open { right: 0; }
            .mobile-header { display: flex; }
            .mobile-nav-toggle { display: block; }
            .overlay.active { display: block; }
            .main-content { padding: 75px 8px 10px 8px; height: calc(100vh - 10px); }
        }
    </style>
</head>
<body>
    <div class="mobile-header">space4learn</div>
    <button class="mobile-nav-toggle" onclick="toggleSidebar()">☰</button>
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <h2>🔍 العدســات</h2>
        <button class="menu-btn active" onclick="showContent('pdf-div', this)">📄 شرح الدرس</button>
        <button class="menu-btn" onclick="showContent('video-div', this)">🎬 تجربة اليوتيوب</button>
        <button class="menu-btn" onclick="showContent('lab-div', this)">🧪 المختبر الافتراضي</button>
        <button class="menu-btn" onclick="showContent('quiz-div', this)">📝 الاختبار الذكي</button>
        <a href="index.html" class="home-btn">🏠 العودة للرئيسية</a>
    </div>

    <div class="main-content">
        <div id="pdf-div" class="display-card active-card">
            <div style="flex: 1; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <iframe src="https://www.canva.com/design/DAG8ONZQLb0/wVvmWzMC5IuMOz-JW7WKsw/view?embed" allowfullscreen></iframe>
            </div>
            <p style="text-align: center; margin-top: 10px; font-weight: bold; color: #1e3a5f;">بواسطة: عمار بركات</p>
        </div>

        <div id="video-div" class="display-card">
      <iframe width="560" height="315" 
src="https://www.youtube-nocookie.com/embed/DZrDusJ6sqo?rel=0&modestbranding=1" 
title="YouTube video player" frameborder="0" 
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
</iframe>
        </div>

        <div id="lab-div" class="display-card">
            <iframe src="https://phet.colorado.edu/sims/html/geometric-optics/latest/geometric-optics_ar.html"></iframe>
        </div>

        <div id="quiz-div" class="display-card">
            <div id="quiz-timer">⏱️ الوقت المتبقي: <span id="timer-display">10:00</span></div>
            <h3>📝 اختبار العدسات - الزمن 10 دقائق</h3>
            <div id="quiz-container">جاري تحميل الأسئلة...</div>
            <button id="submit-quiz-btn" onclick="calculateScore(true)" style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; margin-top: 20px;">إرسال ومعرفة الأخطاء</button>
            <div id="result-box" style="margin-top:20px; text-align:center; font-size:1.4em; font-weight:bold; border-radius: 10px; padding: 15px; display: none;"></div>
        </div>
    </div>

    <script>
        // 1. إعداد YouTube API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'w2s2fZr8sqQ', // نفس الفيديو الذي اخترته
                playerVars: { 'rel': 0, 'showinfo': 0 }
            });
        }

        let timerInstance;
        let timeLeft = 600; 
        let quizLoaded = false;
        let shuffledQuizData = [];

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        // دالة التبديل المحسنة
        function showContent(id, btn) {
            // التحكم في اليوتيوب: التوقف عند الخروج والعمل عند الدخول
            if (player && typeof player.pauseVideo === 'function') {
                if (id === 'video-div') {
                    player.playVideo();
                } else {
                    player.pauseVideo();
                }
            }

            document.querySelectorAll('.display-card').forEach(c => c.classList.remove('active-card'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(id).classList.add('active-card');
            btn.classList.add('active');

            if (id === 'quiz-div' && !quizLoaded) { 
                fetchAndLoadQuiz(); 
                quizLoaded = true; 
            }

            if (window.innerWidth <= 768) toggleSidebar();
        }

        async function fetchAndLoadQuiz() {
            try {
                const response = await fetch('questions.json');
                if (!response.ok) throw new Error("فشل التحميل");
                const allData = await response.json();
                const lightQuestions = allData.filter(item => item.topic === "lenses");

                if (lightQuestions.length === 0) {
                    document.getElementById('quiz-container').innerHTML = "<p>لا توجد أسئلة حالياً.</p>";
                    return;
                }

                shuffledQuizData = shuffle(lightQuestions.map(item => ({
                    q: item.question,
                    options: shuffle([item.option1, item.option2, item.option3, item.option4]),
                    correct: item.answer
                })));

                renderQuiz();
                startTimer();
            } catch (error) {
                document.getElementById('quiz-container').innerHTML = "<p style='color:red;'>عذراً، تعذر تحميل الأسئلة.</p>";
            }
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = shuffledQuizData.map((item, i) => `
                <div class="question-item" id="q-item-${i}">
                    <p><b>${i+1}. ${item.q}</b></p>
                    ${item.options.map(opt => `
                        <label style="display:block; margin:8px 0; cursor:pointer;">
                            <input type="radio" name="q${i}" value="${opt}"> ${opt}
                        </label>
                    `).join('')}
                    <div id="feedback-${i}" class="feedback-text"></div>
                </div>
            `).join('');
        }

        function startTimer() {
            timerInstance = setInterval(() => {
                let min = Math.floor(timeLeft / 60);
                let sec = timeLeft % 60;
                document.getElementById('timer-display').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
                if (timeLeft-- <= 0) { clearInterval(timerInstance); calculateScore(false); }
            }, 1000);
        }

        function calculateScore(manual) {
            if(manual) clearInterval(timerInstance);
            let score = 0;
            shuffledQuizData.forEach((item, i) => {
                const sel = document.querySelector(`input[name="q${i}"]:checked`);
                const qDiv = document.getElementById(`q-item-${i}`);
                const fDiv = document.getElementById(`feedback-${i}`);
                
                if (sel && sel.value === item.correct) { 
                    score++; 
                    qDiv.classList.add('correct-answer'); 
                } else { 
                    qDiv.classList.add('wrong-answer'); 
                    fDiv.style.display = "block"; 
                    fDiv.innerHTML = `❌ الإجابة الصحيحة: ${item.correct}`; 
                }
            });

            const res = document.getElementById('result-box');
            res.style.display = "block";
            res.innerHTML = `انتهى الاختبار! نتيجتك: ${score} من ${shuffledQuizData.length}`;
            res.style.background = score >= (shuffledQuizData.length / 2) ? "#d4edda" : "#f8d7da";
            document.getElementById('submit-quiz-btn').disabled = true;
            document.getElementById('submit-quiz-btn').style.background = "#95a5a6";
            res.scrollIntoView({ behavior: 'smooth' });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>

    <div style="position: fixed; bottom: 15px; left: 15px; background: rgba(30, 58, 95, 0.8); color: white; padding: 6px 15px; border-radius: 50px; font-size: 13px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); z-index: 9999;">
        by: <b>Ammar Barakat</b>
    </div>
</body>
</html>
